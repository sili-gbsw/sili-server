services:
    sili-server:
      build: .
      image: sili-server:latest
      container_name: sili-server
      restart: unless-stopped
      env_file: .env
      ports:
        - "8000:8000"
      healthcheck:
        test:
          - CMD
          - python
          - -c
          - "import urllib.request,sys; sys.exit(0 if
            urllib.request.urlopen('http://127.0.0.1:8000/', timeout=3).status==200 else 1)"
        interval: 30s
        timeout: 5s
        retries: 3
        start_period: 15s